<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta
      name="description"
      content="FSports — Fútbol y Fórmula 1, con otro estilo. Resultados, fixtures y estadísticas del Mundial 2026 y la F1, al instante."
    />
    <title>FSports — Fútbol y F1, con otro estilo</title>
    <link rel="canonical" href="https://oficialfsports.com/" />

    <!-- Open Graph / Twitter Card: preview al compartir en redes -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FSports" />
    <meta property="og:title" content="FSports — Fútbol y F1, con otro estilo" />
    <meta
      property="og:description"
      content="Resultados, fixtures y estadísticas del Mundial 2026 y la Fórmula 1, al instante."
    />
    <meta property="og:url" content="https://oficialfsports.com/" />
    <meta property="og:image" content="https://oficialfsports.com/pwa-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@oficialfsports" />
    <meta name="twitter:title" content="FSports — Fútbol y F1, con otro estilo" />
    <meta
      name="twitter:description"
      content="Resultados, fixtures y estadísticas del Mundial 2026 y la Fórmula 1, al instante."
    />
    <meta name="twitter:image" content="https://oficialfsports.com/pwa-512.png" />

    <!-- Datos estructurados: identidad de la marca para buscadores -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "FSports",
        "url": "https://oficialfsports.com/",
        "logo": "https://oficialfsports.com/pwa-512.png",
        "sameAs": [
          "https://x.com/oficialfsports",
          "https://instagram.com/oficialfsports",
          "https://tiktok.com/@oficialfsports"
        ]
      }
    </script>

    <!-- Tipografías: Bricolage Grotesque (display) + Inter (body) + JetBrains Mono (datos/tiempos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Exo+2:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700;1,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Banderas (flag-icons). Si el CDN falla, el componente <Flag /> muestra el código del país como texto. -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons/css/flag-icons.min.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
